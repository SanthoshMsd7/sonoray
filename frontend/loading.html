<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sonoray ERP - Connect Desktop</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap');
    
    * {
      box-sizing: border-box;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #090d16 0%, #0f172a 50%, #1e1b4b 100%);
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    /* Abstract glow backdrops */
    .glow-ball-1 {
      position: absolute; top: -100px; left: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .glow-ball-2 {
      position: absolute; bottom: -100px; right: -100px;
      width: 450px; height: 450px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .card {
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 2.5rem;
      padding: 3.5rem 3rem;
      text-align: center;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 35px 80px -15px rgba(0, 0, 0, 0.6);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
      z-index: 10;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border-radius: 24px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      box-shadow: 0 12px 40px rgba(99,102,241,0.4);
      margin-bottom: 2rem;
    }

    .spinner {
      position: relative;
      width: 56px;
      height: 56px;
      margin: 0 auto 1.5rem;
    }

    .spinner-circle {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 4px solid transparent;
      border-top-color: #3b82f6;
      border-bottom-color: #6366f1;
      border-radius: 50%;
      animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
    }

    .spinner-inner {
      position: absolute;
      top: 8px; left: 8px; right: 8px; bottom: 8px;
      border: 3px solid transparent;
      border-left-color: #f59e0b;
      border-radius: 50%;
      animation: spin 2s linear infinite reverse;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 900;
      margin: 0 0 0.5rem;
      letter-spacing: -0.03em;
    }

    h1 span {
      background: linear-gradient(to right, #60a5fa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: #94a3b8;
      font-size: 0.9rem;
      font-weight: 500;
      margin: 0 0 2rem;
      line-height: 1.6;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      background: rgba(59, 130, 246, 0.08);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: 9999px;
      color: #60a5fa;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #60a5fa;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.4; }
    }

    .config-panel {
      border-t: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 1.5rem;
      margin-top: 1.5rem;
      text-align: left;
    }

    .config-title {
      font-size: 0.75rem;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
      display: block;
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      color: #fff;
      font-size: 0.85rem;
      font-weight: 600;
      outline: none;
      transition: all 0.2s;
    }

    input[type="text"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    button {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0 1.2rem;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    button:hover {
      opacity: 0.95;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .quick-links {
      margin-top: 1rem;
      display: flex;
      gap: 0.5rem;
    }

    .quick-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 0.75rem;
      padding: 0.5rem;
      border-radius: 8px;
      box-shadow: none;
    }

    .quick-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="glow-ball-1"></div>
  <div class="glow-ball-2"></div>

  <div class="card">
    <div class="logo-container">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>

    <div class="spinner">
      <div class="spinner-circle"></div>
      <div class="spinner-inner"></div>
    </div>

    <h1 id="title-text">Sonoray<span>ERP</span></h1>
    <p id="status-text">Scanning for ERP portal connection...</p>

    <div class="badge" id="status-badge">
      <span class="status-dot"></span>
      Connecting
    </div>

    <div class="config-panel">
      <span class="config-title">Server Configuration</span>
      <div class="input-group">
        <input type="text" id="server-input" placeholder="http://127.0.0.1:3000" />
        <button id="connect-btn">Connect</button>
      </div>
      <div class="quick-links">
        <button class="quick-btn" id="local-btn">Reset to Localhost</button>
        <button class="quick-btn" id="cloud-btn">Reset to Server IP</button>
      </div>
    </div>
  </div>

  <script>
    const serverInput = document.getElementById('server-input');
    const connectBtn = document.getElementById('connect-btn');
    const localBtn = document.getElementById('local-btn');
    const cloudBtn = document.getElementById('cloud-btn');
    const statusText = document.getElementById('status-text');

    // Retrieve default saved settings
    let currentServer = localStorage.getItem('erp_server_url') || 'http://127.0.0.1:3000';
    serverInput.value = currentServer;

    async function testAndRedirect(url) {
      try {
        const cleanUrl = url.trim().replace(/\/$/, "");
        statusText.innerText = `Connecting to ${cleanUrl}...`;
        
        // Timeout check helper
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 3500);

        // Perform connection test using Chromium native stack
        const response = await fetch(cleanUrl, {
          method: 'GET',
          mode: 'no-cors',
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        // Success! Redirect to the live target
        statusText.innerText = "Connection verified! Launching portal...";
        localStorage.setItem('erp_server_url', cleanUrl);
        
        setTimeout(() => {
          window.location.href = cleanUrl;
        }, 800);
        return true;
      } catch (err) {
        console.warn("Connection failed for url:", url, err);
        return false;
      }
    }

    async function startChecker() {
      // 1. Try the user's custom/saved address first
      let success = await testAndRedirect(currentServer);
      if (success) return;

      // 2. If the saved server is not local but failed, try local fallback automatically
      if (currentServer !== 'http://127.0.0.1:3000') {
        success = await testAndRedirect('http://127.0.0.1:3000');
        if (success) return;
      }

      // 3. Both failed. Ask user to verify or input custom URL
      statusText.innerText = "Offline. Please verify your local server is active, or configure a custom cloud server below.";
      
      // Auto-poll in background every 5 seconds to check if local server boots
      setTimeout(startChecker, 5000);
    }

    connectBtn.addEventListener('click', () => {
      const target = serverInput.value.trim();
      if (target) {
        testAndRedirect(target);
      }
    });

    localBtn.addEventListener('click', () => {
      serverInput.value = 'http://127.0.0.1:3000';
      testAndRedirect('http://127.0.0.1:3000');
    });

    cloudBtn.addEventListener('click', () => {
      // Default to your Ubuntu Server IP or custom domain URL
      const prodUrl = 'http://192.168.1.100:3000';
      serverInput.value = prodUrl;
      testAndRedirect(prodUrl);
    });

    // Launch connection loops
    startChecker();
  </script>
</body>
</html>
